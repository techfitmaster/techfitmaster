<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>818 AI 客服</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .chat-container {
      width: 100%;
      max-width: 480px;
      height: 90vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      font-weight: 600;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .kb-status {
      font-size: 12px;
      color: #10b981;
      font-weight: normal;
    }
    .kb-status.loading { color: #f59e0b; }
    .kb-status.error { color: #dc2626; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .message.customer {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.ai {
      align-self: flex-start;
      background: #f3f4f6;
      color: #1f2937;
      border-bottom-left-radius: 4px;
    }
    .message.system {
      align-self: center;
      background: #fef3c7;
      color: #92400e;
      font-size: 13px;
      text-align: center;
    }
    .typing {
      color: #9ca3af;
      font-style: italic;
      font-size: 13px;
      align-self: flex-start;
      padding: 12px 16px;
    }
    .chat-input {
      padding: 16px 20px;
      border-top: 1px solid #eee;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .upload-btn {
      padding: 8px 12px;
      background: #f3f4f6;
      color: #374151;
      border: 1px dashed #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
    }
    .upload-btn:hover { background: #e5e7eb; }
    .input-row {
      display: flex;
      gap: 12px;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .chat-input input:focus { border-color: #2563eb; }
    .chat-input button {
      padding: 12px 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .chat-input button:disabled { background: #93c5fd; cursor: not-allowed; }
    .kb-loaded { display: none; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <span>🤖 818 AI 客服</span>
      <span class="kb-status" id="kbStatus">📚 未加载知识库</span>
    </div>
    <div class="chat-messages" id="messages">
      <div class="message system">请先上传知识库文档（Word .docx）</div>
    </div>
    <div class="chat-input">
      <input type="file" id="fileInput" accept=".docx" style="display:none">
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
        📎 上传知识库 (.docx)
      </button>
      <div class="input-row">
        <input type="text" id="input" placeholder="请先上传知识库..." disabled onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()" id="sendBtn" disabled>发送</button>
      </div>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const kbStatus = document.getElementById('kbStatus');

    let kbText = '';
    let kbChunks = [];
    let isReady = false;

    // 文件上传处理
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      kbStatus.textContent = '⏳ 解析中...';
      kbStatus.className = 'kb-status loading';

      try {
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer });
        kbText = result.value;
        
        // 分块处理（按段落）
        kbChunks = kbText.split(/\n\n+/).filter(c => c.trim().length > 10);
        
        kbStatus.textContent = `✅ 已加载 ${kbChunks.length} 个段落`;
        kbStatus.className = 'kb-status';
        
        // 启用聊天
        input.disabled = false;
        sendBtn.disabled = false;
        input.placeholder = '请输入问题...';
        
        addMessage('知识库已加载！请提出关于产品的问题，我会从文档中查找答案。', 'system');
      } catch (err) {
        kbStatus.textContent = '❌ 解析失败';
        kbStatus.className = 'kb-status error';
        addMessage('文档解析失败，请检查格式', 'system');
      }
    });

    function handleKeyPress(e) {
      if (e.key === 'Enter') sendMessage();
    }

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // 简单的关键词搜索
    function searchKB(query) {
      const keywords = query.toLowerCase().split(/\s+/);
      const scores = kbChunks.map((chunk, i) => {
        const text = chunk.toLowerCase();
        let score = 0;
        keywords.forEach(k => {
          if (text.includes(k)) score += 10;
        });
        // 包含完整查询的优先
        if (text.includes(query.toLowerCase())) score += 20;
        return { index: i, score, text: chunk };
      });
      
      scores.sort((a, b) => b.score - a.score);
      return scores.filter(s => s.score > 0).slice(0, 3).map(s => s.text);
    }

    // 生成回答（关键词匹配 + 模板）
    function generateAnswer(query, relevantChunks) {
      if (relevantChunks.length === 0) {
        return '抱歉，我没有在知识库中找到相关内容。建议您换个问题或联系人工客服。';
      }

      const context = relevantChunks.join('\n\n');
      
      // 简单模板生成
      const answers = [
        `根据文档资料：\n\n${relevantChunks[0].slice(0, 300)}${relevantChunks[0].length > 300 ? '...' : ''}`,
        `查到了相关内容：\n\n${relevantChunks.slice(0, 2).join('\n\n').slice(0, 400)}...`,
        `以下信息可能帮助您：\n\n${relevantChunks[0].slice(0, 250)}...`
      ];
      
      return answers[Math.floor(Math.random() * answers.length)];
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || !isReady) return;

      addMessage(text, 'customer');
      input.value = '';
      sendBtn.disabled = true;

      // 显示正在思考
      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing';
      typingDiv.textContent = '🔍 搜索知识库...';
      messagesDiv.appendChild(typingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      try {
        await new Promise(r => setTimeout(r, 500));
        
        // 搜索相关段落
        const relevant = searchKB(text);
        typingDiv.textContent = '🤖 生成回答...';
        
        await new Promise(r => setTimeout(r, 500));
        
        typingDiv.remove();
        const answer = generateAnswer(text, relevant);
        addMessage(answer, 'ai');
      } catch (e) {
        typingDiv.remove();
        addMessage('出错了，请重试', 'ai');
      }

      sendBtn.disabled = false;
      input.focus();
    }

    // 检查知识库是否已加载（页面刷新后丢失）
    window.addEventListener('load', () => {
      if (kbChunks.length > 0) {
        isReady = true;
        input.disabled = false;
        sendBtn.disabled = false;
        input.placeholder = '请输入问题...';
      }
    });
    isReady = true;
  </script>
</body>
</html>
